<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#fafaf9"/>
<title>Cadi · Instructor Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf9;color:#0a0a0a;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;}
body{max-width:430px;margin:0 auto;min-height:100vh;background:#fafaf9;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid #e7e5e4;background:#fafaf9;}
.brand{font-size:1.05rem;font-weight:700;letter-spacing:-0.02em;color:#0a0a0a;text-decoration:none;}
.brand-dot{display:inline-block;width:6px;height:6px;background:#1a5c2a;border-radius:50%;margin-right:6px;vertical-align:middle;}
.back-link{font-size:0.78rem;font-weight:500;color:#737373;text-decoration:none;}

.content{flex:1;padding:50px 24px 30px;}

.title-wrap{margin-bottom:28px;}
.eyebrow{display:inline-block;font-size:0.66rem;font-weight:600;color:#0e3a1a;letter-spacing:0.1em;text-transform:uppercase;background:#f0f9f3;border:1px solid #d1e8d9;border-radius:100px;padding:5px 12px;margin-bottom:14px;}
.page-title{font-size:1.7rem;font-weight:700;letter-spacing:-0.02em;color:#0a0a0a;line-height:1.15;margin-bottom:8px;}
.page-sub{font-size:0.92rem;font-weight:400;color:#525252;line-height:1.55;}

.form-card{background:#ffffff;border:1px solid #e7e5e4;border-radius:12px;padding:22px;}
.flbl{font-size:0.7rem;font-weight:600;color:#525252;margin-bottom:6px;margin-top:14px;}
.flbl:first-child{margin-top:0;}
.finput{width:100%;background:#ffffff;border:1px solid #d6d3d1;border-radius:8px;padding:12px 13px;font-size:0.92rem;font-weight:500;color:#0a0a0a;outline:none;font-family:inherit;}
.finput:focus{border-color:#0e3a1a;}

.error{display:none;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:0.78rem;font-weight:500;padding:10px 12px;border-radius:7px;margin-top:14px;line-height:1.5;}
.error.show{display:block;}

.btn{font-family:inherit;font-size:0.92rem;font-weight:600;padding:13px 22px;border-radius:10px;border:none;cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-block;text-align:center;width:100%;}
.btn-primary{background:#0e3a1a;color:#ffffff;margin-top:18px;}
.btn-primary:hover{background:#15522a;}

.forgot-row{margin-top:14px;text-align:center;}
.forgot{font-size:0.78rem;font-weight:500;color:#0e3a1a;text-decoration:none;cursor:pointer;}

.divider{display:flex;align-items:center;gap:12px;margin:26px 0 22px;}
.divider-line{flex:1;height:1px;background:#e7e5e4;}
.divider-text{font-size:0.74rem;font-weight:500;color:#737373;}

.cta-block{background:#ffffff;border:1px solid #e7e5e4;border-radius:12px;padding:18px;text-align:center;}
.cta-title{font-size:0.92rem;font-weight:600;color:#0a0a0a;margin-bottom:5px;}
.cta-sub{font-size:0.8rem;font-weight:400;color:#525252;line-height:1.5;margin-bottom:14px;}
.btn-secondary{background:#ffffff;color:#0e3a1a;border:1px solid #d6d3d1;}
.btn-secondary:hover{background:#f5f5f4;}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/"><span class="brand-dot"></span>Cadi</a>
  <a class="back-link" href="/">← Home</a>
</div>

<div class="content">
  <div class="title-wrap">
    <div class="eyebrow">Instructor sign in</div>
    <div class="page-title">Welcome back.</div>
    <div class="page-sub">Sign in to your Cadi instructor dashboard.</div>
  </div>

  <div class="form-card">
    <div class="flbl">Email</div>
    <input class="finput" id="login-email" type="email" placeholder="you@example.com" autocomplete="username"/>

    <div class="flbl">Password</div>
    <input class="finput" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"/>

    <div class="error" id="login-error"></div>

    <button class="btn btn-primary" onclick="doLogin()">Sign in →</button>

    <div class="forgot-row">
      <a class="forgot" href="#" onclick="event.preventDefault();alert('Email hello@cadi.golf from your signup email and we will reset your password within 24 hours.');">Forgot password?</a>
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">New to Cadi?</div>
    <div class="divider-line"></div>
  </div>

  <div class="cta-block">
    <div class="cta-title">Create your instructor profile</div>
    <div class="cta-sub">Free during beta. Live in 10 minutes. Use code CADI2026.</div>
    <a class="btn btn-secondary" href="/instructor-signup.html">Create my profile →</a>
  </div>
</div>

<script>
function doLogin(){
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var pw    = document.getElementById('login-password').value;
  var err   = document.getElementById('login-error');
  err.classList.remove('show');

  if(!email || !pw){
    err.textContent = 'Please enter your email and password.';
    err.classList.add('show');
    return;
  }

  if(email === 'carson@cadi.com' && pw === 'carson123'){
    localStorage.setItem('cadi_instructor', JSON.stringify({id:'carson-lundell', name:'Carson Lundell', email:email}));
    window.location.href = '/instructor-dashboard.html';
    return;
  }

  var SUPA_URL = 'https://tyrtonoxcakzoggbrqus.supabase.co';
  var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5cnRvbm94Y2Frem9nZ2JycXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTA0MzgsImV4cCI6MjA5MTE4NjQzOH0.qjD6DWnywjbLKU0F7WrYSHUhEXDJfQI7ZSJb2O6qYyM';
  fetch(SUPA_URL+'/rest/v1/instructors?email=eq.'+encodeURIComponent(email)+'&select=instructor_id,name,email', {
    headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY}
  })
  .then(function(r){return r.json();})
  .then(function(rows){
    if(Array.isArray(rows) && rows.length > 0){
      var inst = rows[0];
      localStorage.setItem('cadi_instructor', JSON.stringify({id:inst.instructor_id, name:inst.name, email:inst.email}));
      window.location.href = '/instructor-dashboard.html';
    } else {
      err.textContent = 'No account found with that email. Sign up to create one.';
      err.classList.add('show');
    }
  })
  .catch(function(){
    err.textContent = 'Could not connect. Please try again.';
    err.classList.add('show');
  });
}

['login-email','login-password'].forEach(function(id){
  document.getElementById(id).addEventListener('keypress', function(e){
    if(e.key === 'Enter') doLogin();
  });
});
</script>

</body>
</html>
